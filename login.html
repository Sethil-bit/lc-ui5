<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1b4d6b, #0a1a24);
}

/* 🌊 Canvas Ocean */
canvas{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* 🔐 Login Box */
.login{
  position:relative;
  z-index:2;
  width:320px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  color:#fff;
  text-align:center;
}

.login h2{
  margin-bottom:20px;
  letter-spacing:1px;
}

.input{
  position:relative;
  margin-bottom:25px;
}

.input input{
  width:100%;
  padding:12px;
  border:none;
  border-bottom:2px solid rgba(255,255,255,0.6);
  background:transparent;
  color:#fff;
  outline:none;
}

.input label{
  position:absolute;
  left:0;
  top:12px;
  color:rgba(255,255,255,0.7);
  transition:0.3s;
  pointer-events:none;
}

.input input:focus ~ label,
.input input:valid ~ label{
  top:-10px;
  font-size:12px;
  color:#00d4ff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.msg{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<canvas id="ocean"></canvas>

<div class="login">
  <h2>Login</h2>

  <div class="input">
    <input type="text" id="user" required>
    <label>Username</label>
  </div>

  <button onclick="login()">Enter</button>
  <div class="msg" id="msg"></div>
</div>

<script>
/* =========================
   🌊 REALISTIC OCEAN ENGINE
========================= */
const canvas = document.getElementById("ocean");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let t = 0;

function drawWave(color, amp, freq, speed, yOffset){
  ctx.beginPath();
  ctx.moveTo(0, canvas.height);

  for(let x = 0; x <= canvas.width; x++){
    let y = 
      Math.sin((x * freq) + t * speed) * amp +
      Math.sin((x * 0.01) + t * 0.6) * (amp * 0.4);

    ctx.lineTo(x, canvas.height - y - yOffset);
  }

  ctx.lineTo(canvas.width, canvas.height);
  ctx.fillStyle = color;
  ctx.fill();
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 🌊 Deep sea base
  drawWave("rgba(0,30,60,0.9)", 20, 0.01, 0.6, 80);

  // 🌊 Mid waves
  drawWave("rgba(0,90,160,0.6)", 30, 0.015, 1.0, 60);

  // 🌊 Top waves (foam look)
  drawWave("rgba(0,180,255,0.35)", 40, 0.02, 1.4, 40);

  t += 0.02;
  requestAnimationFrame(animate);
}

animate();

/* =========================
   🔐 LOGIN
========================= */
function login(){
  const u = document.getElementById('user').value.trim();
  const msg = document.getElementById('msg');

  if(u.length < 2){
    msg.style.color = "red";
    msg.innerText = "Enter valid username";
    return;
  }

  localStorage.setItem("currentUserName", u);

  msg.style.color = "lightgreen";
  msg.innerText = "Welcome ⚓";

  setTimeout(()=>{
    window.location.href = "main.html";
  }, 1000);
}
  document.getElementById("user").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});
  
</script>

</body>
</html>
