<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nexus — Advanced Access</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
  }

  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at 50% 20%, #0f3a52, #020b12 80%);
  }

  /* 🌊 Canvas background (fluid ocean) */
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: block;
  }

  /* 💎 Glassmorphic login container */
  .login {
    position: relative;
    z-index: 2;
    width: 380px;
    max-width: 88vw;
    padding: 42px 38px 48px;
    border-radius: 42px;
    background: rgba(12, 25, 35, 0.45);
    backdrop-filter: blur(20px) saturate(180%);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(0, 255, 255, 0.25);
    transition: all 0.3s ease;
    text-align: center;
  }

  .login h2 {
    margin-bottom: 32px;
    font-weight: 600;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #fff, #a0f0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-size: 32px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  /* 🧩 Input group — refined & smooth */
  .input-group {
    position: relative;
    margin-bottom: 36px;
    width: 100%;
  }

  .input-group input {
    width: 100%;
    padding: 16px 14px 8px 14px;
    border: none;
    border-bottom: 2px solid rgba(255, 255, 255, 0.55);
    background: rgba(255, 255, 255, 0.04);
    color: #ffffff;
    outline: none;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border-radius: 12px 12px 0 0;
  }

  .input-group input:focus {
    border-bottom-color: #00eaff;
    background: rgba(0, 210, 255, 0.08);
    box-shadow: 0 4px 14px rgba(0, 234, 255, 0.2);
  }

  /* label floating animation */
  .input-group label {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(210, 240, 255, 0.75);
    font-size: 15px;
    font-weight: 500;
    pointer-events: none;
    transition: 0.2s ease-out;
    background: transparent;
    backdrop-filter: blur(2px);
  }

  .input-group input:focus ~ label,
  .input-group input:valid ~ label {
    top: 2px;
    transform: translateY(0);
    font-size: 11px;
    color: #00f2ff;
    letter-spacing: 0.8px;
    text-shadow: 0 0 3px rgba(0,255,255,0.5);
  }

  /* 🛡️ Autofill brute force fix — keeps transparency */
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus,
  input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 1000px rgba(20, 40, 55, 0.85) inset !important;
    box-shadow: 0 0 0 1000px rgba(20, 40, 55, 0.85) inset !important;
    -webkit-text-fill-color: #ffffff !important;
    caret-color: #00eaff;
    border-bottom: 2px solid rgba(0, 234, 255, 0.9) !important;
    transition: background-color 9999s ease;
  }

  input::selection {
    background: #00ccdd55;
    color: white;
  }

  /* 🧨 Error message — smooth, clean, modern */
  .error-msg {
    position: absolute;
    bottom: -24px;
    left: 12px;
    font-size: 12px;
    font-weight: 500;
    color: #ffb3b3;
    background: rgba(255, 50, 70, 0.18);
    backdrop-filter: blur(8px);
    padding: 4px 12px;
    border-radius: 40px;
    letter-spacing: 0.3px;
    border-left: 3px solid #ff6670;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }

  .error-msg.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ✨ smooth button */
  button {
    width: 100%;
    padding: 14px 18px;
    border: none;
    border-radius: 44px;
    background: linear-gradient(105deg, #00c3ff, #005eff);
    color: white;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 6px 16px rgba(0, 150, 255, 0.3);
    letter-spacing: 0.3px;
    margin-top: 10px;
  }

  button:hover {
    transform: scale(0.98);
    background: linear-gradient(105deg, #00d4ff, #1a66ff);
    box-shadow: 0 8px 22px rgba(0, 200, 255, 0.4);
  }

  button:active {
    transform: scale(0.96);
  }

  /* 🚀 loading bar — modern clean */
  .loader {
    margin-top: 24px;
    width: 100%;
    height: 5px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 20px;
    overflow: hidden;
    display: none;
  }

  .loader span {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00eaff, #3f7eff);
    border-radius: 20px;
    animation: smoothLoad 1.1s cubic-bezier(0.25, 0.85, 0.4, 1) forwards;
  }

  @keyframes smoothLoad {
    0% { width: 0%; }
    40% { width: 65%; }
    100% { width: 100%; }
  }

  /* extra polish */
  .hint-message {
    font-size: 11px;
    color: #b0e0ffaa;
    margin-top: 18px;
    text-align: center;
    backdrop-filter: blur(4px);
  }

  /* Responsive */
  @media (max-width: 480px) {
    .login { padding: 32px 24px 40px; }
    .input-group input { font-size: 16px; padding: 14px 12px 6px 12px; }
    .error-msg { white-space: normal; font-size: 10px; bottom: -26px; }
  }
</style>
</head>
<body>

<canvas id="oceanCanvas"></canvas>

<div class="login">
  <h2>Login</h2>
  
  <div class="input-group">
    <input type="text" id="usernameField" autocomplete="off" required spellcheck="false">
    <label>Username</label>
    <div id="usernameError" class="error-msg"></div>
  </div>

  <button id="enterBtn">  Enter  </button>

  <div class="loader" id="loadingBar">
    <span></span>
  </div>
  <div class="hint-message">⚡ at least 2 characters · alphanumeric & spaces allowed</div>
</div>

<script>
  (function() {
    // ------------------------------
    //  🌊  ADVANCED OCEAN WAVES CANVAS (fixed resize & interaction)
    // ------------------------------
    const canvas = document.getElementById("oceanCanvas");
    const ctx = canvas.getContext("2d");
    
    let width = window.innerWidth;
    let height = window.innerHeight;
    let time = 0;
    let mouseNorm = { x: 0.5, y: 0.3 };
    
    function handleResize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener("resize", handleResize);
    handleResize();
    
    window.addEventListener("mousemove", (e) => {
      mouseNorm.x = e.clientX / width;
      mouseNorm.y = e.clientY / height;
    });
    
    // wave mathematics — elegant & fluid
    function waveValue(x, freq, amplitude, speed, phase) {
      return Math.sin(x * freq + time * speed + phase) * amplitude;
    }
    
    function drawLiquidLayer(baseColor, baseAmp, freq, speed, yOffset, alpha) {
      ctx.beginPath();
      let startX = 0;
      for (let x = 0; x <= width; x += 3) {
        // mouse influence: dynamic distortion (subtle but alive)
        let influenceX = (x / width) * Math.PI;
        let mouseForceX = (mouseNorm.x - 0.5) * 1.8;
        let mouseForceY = mouseNorm.y * 12;
        let dynamicAmp = baseAmp + mouseForceX * 7 + mouseForceY * 3;
        if (dynamicAmp < 6) dynamicAmp = 6;
        
        // composite wave - two frequencies for rich motion
        let y1 = waveValue(x, freq, dynamicAmp, speed, 0);
        let y2 = waveValue(x, freq * 0.47, dynamicAmp * 0.6, speed * 0.72, 1.8);
        let y3 = waveValue(x, freq * 1.9, dynamicAmp * 0.28, speed * 1.3, 3.2);
        let yPos = y1 + y2 + y3;
        
        ctx.lineTo(x, height - yPos - yOffset);
      }
      ctx.lineTo(width, height);
      ctx.lineTo(0, height);
      ctx.closePath();
      ctx.fillStyle = baseColor;
      ctx.globalAlpha = alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    
    function drawReflectionGlow() {
      const grad = ctx.createLinearGradient(0, height * 0.5, 0, height);
      grad.addColorStop(0, "rgba(0, 220, 255, 0.08)");
      grad.addColorStop(1, "rgba(0, 30, 50, 0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);
      // soft highlight
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = `rgba(0, 210, 255, ${0.02 - i * 0.005})`;
        ctx.fillRect(0, height * 0.7, width, height * 0.3);
      }
      ctx.globalCompositeOperation = 'source-over';
    }
    
    function animateWaves() {
      if (!ctx) return;
      ctx.clearRect(0, 0, width, height);
      // deep ocean gradient background
      const gradSky = ctx.createLinearGradient(0, 0, 0, height);
      gradSky.addColorStop(0, "#02131e");
      gradSky.addColorStop(1, "#00070c");
      ctx.fillStyle = gradSky;
      ctx.fillRect(0, 0, width, height);
      
      // 4 layers of mesmerizing waves
      drawLiquidLayer("#08384f", 22, 0.0057, 0.32, 125, 0.92);
      drawLiquidLayer("#0c597a", 32, 0.0073, 0.55, 95, 0.8);
      drawLiquidLayer("#1182ab", 42, 0.0092, 0.84, 65, 0.6);
      drawLiquidLayer("#1bb0e0", 52, 0.0115, 1.18, 35, 0.4);
      
      drawReflectionGlow();
      time += 0.009;
      requestAnimationFrame(animateWaves);
    }
    animateWaves();
    
    // ------------------------------
    //  ✨ LOGIC: VALIDATION WITH ERROR MESSAGES (clean & advanced)
    // ------------------------------
    const usernameInput = document.getElementById("usernameField");
    const errorDiv = document.getElementById("usernameError");
    const enterBtn = document.getElementById("enterBtn");
    const loaderDiv = document.getElementById("loadingBar");
    
    // Real-time validation & error clear while typing
    function validateUsername(value) {
      const trimmed = value.trim();
      if (trimmed === "") {
        return { valid: false, message: "⛔ Username cannot be empty" };
      }
      if (trimmed.length < 2) {
        return { valid: false, message: "❗ Username must contain at least 2 characters" };
      }
      // allow letters, numbers, spaces, dots, underscores (modern)
      const validPattern = /^[a-zA-Z0-9][a-zA-Z0-9\s\._\-]{0,28}[a-zA-Z0-9]$|^[a-zA-Z0-9]{1,2}$/i;
      // refined rule: cannot be only spaces, better readability
      if (!validPattern.test(trimmed) && trimmed.length > 1) {
        return { valid: false, message: "✨ Use letters, numbers, spaces or . _ -" };
      }
      // extra: avoid only numbers if length super short? but it's fine, just provide suggestion.
      if (/^\d+$/.test(trimmed) && trimmed.length < 3) {
        return { valid: false, message: "🔢 Add letters for a valid username" };
      }
      return { valid: true, message: "" };
    }
    
    function showErrorMsg(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.add("show");
      // style smooth shake? optional subtle effect on input
      usernameInput.style.borderBottomColor = "#ff7777";
      setTimeout(() => {
        if (errorDiv.textContent === msg) {
          // but we keep if same error, don't auto clear if still invalid, but it's ok.
        }
      }, 200);
    }
    
    function hideError() {
      errorDiv.classList.remove("show");
      errorDiv.textContent = "";
      usernameInput.style.borderBottomColor = "rgba(255,255,255,0.55)";
    }
    
    function resetErrorStyle() {
      hideError();
    }
    
    // realtime check on input: clear error while user fixes or updates
    usernameInput.addEventListener("input", function(e) {
      const rawValue = e.target.value;
      const validation = validateUsername(rawValue);
      if (!validation.valid && rawValue.trim().length > 0) {
        showErrorMsg(validation.message);
      } else {
        hideError();
      }
      // if the field becomes valid, we remove errors instantly
      if (validation.valid && rawValue.trim().length >= 2) {
        hideError();
      } else if (rawValue.trim().length === 0) {
        hideError();
      }
    });
    
    // on blur, re-validate to give persistent feedback
    usernameInput.addEventListener("blur", function() {
      const val = usernameInput.value;
      const check = validateUsername(val);
      if (!check.valid && val.trim().length > 0) {
        showErrorMsg(check.message);
      } else if (val.trim() === "") {
        showErrorMsg("📛 Please enter your username");
      } else {
        hideError();
      }
    });
    
    usernameInput.addEventListener("focus", function() {
      // if previously error but user starts typing, reset style/hide error fully
      if (errorDiv.classList.contains("show")) {
        const current = usernameInput.value;
        const test = validateUsername(current);
        if (test.valid || current.trim().length === 0) hideError();
      }
    });
    
    // main login action
    function performLogin() {
      const username = usernameInput.value;
      const trimmedUser = username.trim();
      const validation = validateUsername(trimmedUser);
      
      // advanced check: show error BEFORE loader
      if (!validation.valid || trimmedUser.length < 2) {
        let msg = validation.valid ? "Username must be at least 2 characters" : validation.message;
        if (trimmedUser === "") msg = "⛔ Username required";
        if (trimmedUser.length === 1) msg = "❗ At least 2 characters needed";
        showErrorMsg(msg);
        // gentle feedback effect on button
        enterBtn.style.transform = "scale(0.97)";
        setTimeout(() => { enterBtn.style.transform = ""; }, 150);
        return false;
      }
      
      // extra char sanitize but good
      hideError();
      // Save username to localStorage for the main page
      localStorage.setItem("currentUserName", trimmedUser);
      
      // show loader animation
      loaderDiv.style.display = "block";
      // Disable button temporarily to avoid double click
      enterBtn.disabled = true;
      enterBtn.style.opacity = "0.8";
      enterBtn.style.cursor = "wait";
      
      // smooth navigation after loading completes
      setTimeout(() => {
        // redirect to main dashboard page (mock/main)
        // In this simulation, we check main.html existence? it's external but standard flow.
        // Since main.html is upcoming in the ecosystem, we perform redirection.
        window.location.href = "main.html";
      }, 1250);
      return true;
    }
    
    // click button handler
    enterBtn.addEventListener("click", (e) => {
      e.preventDefault();
      performLogin();
    });
    
    // Enter key event on input
    usernameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        performLogin();
      }
    });
    
    // Optional: pre-clean if there is any saved test value? no, keep clean demo
    // Also prevents accidental space-only submission on input edge
    usernameInput.addEventListener("beforeinput", (e) => {
      if (e.inputType === "insertText" && e.data === " ") {
        // we allow spaces but not leading-only; later validation handles
      }
    });
    
    // Bonus: set initial visual no error on load (empty)
    hideError();
    
    // micro interaction: dynamic border flow (just design)
    const loginDiv = document.querySelector('.login');
    if (loginDiv) {
      setInterval(() => {
        const hue = (Date.now() * 0.001) % 30;
        loginDiv.style.borderColor = `rgba(0, 220, 255, ${0.2 + Math.sin(Date.now() * 0.003) * 0.1})`;
      }, 800);
    }
  })();
</script>
</body>
</html>
