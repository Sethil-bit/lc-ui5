<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#0f2027,#203a43,#2c5364);
  overflow:hidden;
}

/* 🌊 SVG Waves */
.ocean{
  position:absolute;
  bottom:0;
  width:100%;
}

.wave svg{
  display:block;
  width:200%;
  height:150px;
  animation:waveMove 10s linear infinite;
}

.wave:nth-child(2) svg{animation-duration:18s;opacity:.6}
.wave:nth-child(3) svg{animation-duration:25s;opacity:.4}

@keyframes waveMove{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}



.ship::before{
  content:'';
  position:absolute;
  top:-30px;
  left:40px;
  width:40px;
  height:30px;
  background:rgba(0,0,0,0.5);
  border-radius:5px;
}

.ship::after{
  content:'';
  position:absolute;
  top:-50px;
  left:58px;
  width:4px;
  height:50px;
  background:rgba(0,0,0,0.5);
}

@keyframes shipMove{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(-8px)}
}

@keyframes shipMove{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(-10px)}
}

/* Login box */
.login{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.1);
  padding:40px;
  border-radius:20px;
  width:320px;
  color:#fff;
  z-index:2;
  text-align:center;
}

.input{
  position:relative;
  margin-bottom:25px;
}

.input input{
  width:100%;
  padding:10px;
  border:none;
  border-bottom:2px solid #fff;
  background:transparent;
  color:#fff;
  outline:none;
}

.input label{
  position:absolute;
  top:10px;
  left:0;
  transition:.3s;
}

.input input:focus ~ label,
.input input:valid ~ label{
  top:-10px;
  font-size:12px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:25px;
  background:#fff;
  cursor:pointer;
}

.msg{margin-top:10px}

</style>
</head>
<body>



<!-- Waves -->
<div class="ocean">
  <div class="wave">
    <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
      <path d="M0,30 C150,80 350,0 600,40 C850,80 1050,20 1200,40 L1200,120 L0,120 Z" fill="#00c6ff"></path>
    </svg>
  </div>
  <div class="wave">
    <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
      <path d="M0,40 C200,0 400,80 600,40 C800,0 1000,80 1200,40 L1200,120 L0,120 Z" fill="#0072ff"></path>
    </svg>
  </div>
  <div class="wave">
    <svg viewBox="0 0 1200 120" preserveAspectRatio="none">
      <path d="M0,50 C150,100 350,20 600,60 C850,100 1050,40 1200,60 L1200,120 L0,120 Z" fill="#005bea"></path>
    </svg>
  </div>
</div>

<!-- Login -->
<div class="login" id="box">
  <h2>Ocean Login</h2>

  <div class="input">
    <input type="text" id="user" required>
    <label>Username</label>
  </div>

  <button onclick="login()">Enter</button>
  <div class="msg" id="msg"></div>
</div>

<script>
function login(){
  const u=document.getElementById('user').value.trim();
  const msg=document.getElementById('msg');

  if(u.length<2){
    msg.innerHTML='Enter valid username';
    msg.style.color='red';
    return;
  }

  msg.innerHTML='Welcome Captain ⚓';
  msg.style.color='lightgreen';

  localStorage.setItem('currentUserName',u);

  setTimeout(()=>{
    window.location.href='main.html';
  },1000);
}
</script>

</body>
</html>
