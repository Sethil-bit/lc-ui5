<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at 50% 20%, #0f3a52, #020b12 80%);
}

/* 🌊 CANVAS */
canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* 💎 LOGIN */
.login{
  position:relative;
  z-index:2;
  width:340px;
  padding:45px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(25px) saturate(160%);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 0 40px rgba(255,255,255,0.05);
  color:#fff;
  text-align:center;
}

.login h2{
  margin-bottom:25px;
}

/* INPUT */
.input{
  position:relative;
  margin-bottom:30px;
}

.input input{
  width:100%;
  padding:12px;
  border:none;
  border-bottom:2px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.05); /* FIX BASE */
  color:#fff;
  outline:none;
  font-size:15px;
}

/* 🔥 FULL AUTOFILL + WHITE FIX */
input,
input:focus,
input:active{
  background-color: rgba(255,255,255,0.05) !important;
}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active{
  -webkit-box-shadow: 0 0 0 1000px rgba(255,255,255,0.05) inset !important;
  box-shadow: 0 0 0 1000px rgba(255,255,255,0.05) inset !important;
  -webkit-text-fill-color: #ffffff !important;
  caret-color:#ffffff;
  border-bottom:2px solid rgba(255,255,255,0.5) !important;
  transition: background-color 9999s ease-in-out 0s;
}

/* 🖱️ TEXT SELECTION FIX */
input::selection{
  background: rgba(0,200,255,0.3);
  color:#fff;
}
input::-moz-selection{
  background: rgba(0,200,255,0.3);
  color:#fff;
}

.input label{
  position:absolute;
  left:0;
  top:12px;
  color:rgba(255,255,255,0.6);
  transition:0.3s;
  pointer-events:none;
}

.input input:focus ~ label,
.input input:valid ~ label{
  top:-12px;
  font-size:12px;
  color:#00eaff;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:30px;
  background:linear-gradient(120deg,#00eaff,#0072ff);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* 🚀 LOADING BAR */
.loader{
  margin-top:20px;
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
  display:none;
}

.loader span{
  display:block;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00eaff,#0072ff);
  animation:load 1.2s ease forwards;
}

@keyframes load{
  from{width:0%;}
  to{width:100%;}
}
</style>
</head>

<body>

<canvas id="ocean"></canvas>

<div class="login">
  <h2>Login</h2>

  <div class="input">
    <input type="text" id="user" required>
    <label>Username</label>
  </div>

  <button onclick="login()">Enter</button>

  <div class="loader" id="loader">
    <span></span>
  </div>
</div>

<script>
const canvas = document.getElementById("ocean");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let t = 0;
let mouseX = 0;
let mouseY = 0;

addEventListener("mousemove", e=>{
  mouseX = e.clientX / canvas.width;
  mouseY = e.clientY / canvas.height;
});

function wave(x,f,a,s,p){
  return Math.sin(x*f + t*s + p) * a;
}

function drawLayer(color,amp,freq,speed,offset,alpha){
  ctx.beginPath();

  for(let x=0;x<=canvas.width;x++){
    let influence = Math.sin((x/canvas.width + mouseX)*Math.PI);
    let dynamicAmp = amp + influence*15*mouseY;

    let y =
      wave(x,freq,dynamicAmp,speed,0)+
      wave(x,freq*0.5,dynamicAmp*0.5,speed*0.6,2)+
      wave(x,freq*1.5,dynamicAmp*0.3,speed*1.3,5);

    ctx.lineTo(x,canvas.height - y - offset);
  }

  ctx.lineTo(canvas.width,canvas.height);
  ctx.lineTo(0,canvas.height);
  ctx.closePath();

  ctx.fillStyle=color;
  ctx.globalAlpha=alpha;
  ctx.fill();
  ctx.globalAlpha=1;
}

function reflection(){
  const g=ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,"rgba(0,255,255,0.12)");
  g.addColorStop(1,"transparent");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const bg=ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,"#03141f");
  bg.addColorStop(1,"#00070c");
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawLayer("#062437",25,0.006,0.4,120,0.9);
  drawLayer("#0a4a6a",35,0.008,0.6,90,0.7);
  drawLayer("#0e7ea6",45,0.01,0.9,60,0.5);
  drawLayer("#13b7e6",55,0.012,1.2,30,0.35);

  reflection();

  t+=0.008;
  requestAnimationFrame(animate);
}
animate();

/* LOGIN */
function login(){
  const u=document.getElementById('user').value.trim();
  if(u.length<2) return;

  localStorage.setItem("currentUserName",u);

  document.getElementById("loader").style.display="block";

  setTimeout(()=>{
    window.location.href="main.html";
  },1200);
}

/* ENTER KEY */
document.getElementById("user").addEventListener("keydown",e=>{
  if(e.key==="Enter") login();
});
</script>

</body>
</html>
