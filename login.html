<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LC date calculation — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  :root {
    --cyan: #00e5ff;
    --cyan-dim: rgba(0,229,255,0.18);
    --cyan-glow: rgba(0,229,255,0.35);
    --teal: #00b4d8;
    --deep: #020c14;
    --card-bg: rgba(5, 20, 32, 0.72);
    --border: rgba(0,229,255,0.22);
    --input-line: rgba(255,255,255,0.3);
    --text-primary: #e8f8ff;
    --text-muted: rgba(180,230,245,0.65);
    --error: #ff6b8a;
    --error-bg: rgba(255,60,90,0.15);
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--deep);
  }

  body {
    display: flex; justify-content: center; align-items: center;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Canvas ── */
  canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ── Login card ── */
  .card {
    position: relative; z-index: 2;
    width: 400px; max-width: 92vw;
    padding: 52px 44px 56px;
    border-radius: 28px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    backdrop-filter: blur(28px) saturate(160%);
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.06) inset,
      0 40px 80px rgba(0,0,0,0.65),
      0 0 60px rgba(0,180,230,0.07);

    /* entrance animation */
    animation: cardIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(36px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* subtle breathing border */
  .card::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 29px;
    background: linear-gradient(135deg, rgba(0,229,255,0.25), transparent 55%, rgba(0,120,200,0.15));
    z-index: -1;
    animation: borderPulse 4s ease-in-out infinite;
  }

  @keyframes borderPulse {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }

  /* ── Header ── */
  .card-header {
    text-align: center;
    margin-bottom: 44px;
    animation: fadeUp 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .logo-ring {
    width: 54px; height: 54px;
    margin: 0 auto 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,229,255,0.4);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,229,255,0.07);
    box-shadow: 0 0 20px rgba(0,229,255,0.15);
    animation: ringPulse 3s ease-in-out infinite;
  }

  @keyframes ringPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0,229,255,0.15); }
    50%       { box-shadow: 0 0 32px rgba(0,229,255,0.32); }
  }

  .logo-ring svg {
    width: 22px; height: 22px;
    stroke: var(--cyan); fill: none; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px; font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  /* ── Input group ── */
  .field {
    position: relative;
    margin-bottom: 40px;
    animation: fadeUp 0.9s 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }

  .field input {
    width: 100%;
    padding: 18px 14px 8px;
    background: rgba(0,229,255,0.04);
    border: none;
    border-bottom: 1.5px solid var(--input-line);
    border-radius: 12px 12px 0 0;
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 400;
    outline: none;
    transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    caret-color: var(--cyan);
  }

  .field input:focus {
    border-bottom-color: var(--cyan);
    background: rgba(0,229,255,0.07);
    box-shadow: 0 6px 20px rgba(0,229,255,0.12);
  }

  .field label {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px; font-weight: 400;
    color: var(--text-muted);
    pointer-events: none;
    transition: all 0.2s ease;
  }

  .field input:focus ~ label,
  .field input:valid ~ label {
    top: 6px; transform: none;
    font-size: 10px; letter-spacing: 1px;
    color: var(--cyan);
    text-transform: uppercase;
  }

  /* autofill override */
  input:-webkit-autofill,
  input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px rgba(0,15,25,0.9) inset !important;
    -webkit-text-fill-color: var(--text-primary) !important;
    border-bottom-color: var(--cyan) !important;
    transition: background-color 9999s;
  }

  /* ── Error ── */
  .error {
    position: absolute; bottom: -26px; left: 10px;
    font-size: 11.5px; font-weight: 500;
    color: var(--error);
    background: var(--error-bg);
    padding: 3px 12px;
    border-radius: 30px;
    border-left: 2px solid var(--error);
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none; white-space: nowrap;
  }

  .error.show { opacity: 1; transform: translateY(0); }

  /* ── Button ── */
  .btn-wrap {
    animation: fadeUp 0.9s 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  button#enterBtn {
    position: relative;
    width: 100%; padding: 15px;
    border: none; border-radius: 50px;
    background: linear-gradient(110deg, #00b4d8, #0077b6);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 8px 24px rgba(0,150,220,0.3);
  }

  button#enterBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,180,255,0.4);
  }

  button#enterBtn:active { transform: scale(0.97); }

  /* ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: scale(0);
    animation: rippleOut 0.6s linear forwards;
    pointer-events: none;
  }

  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }

  /* ── Loader ── */
  .loader {
    height: 3px; width: 100%;
    background: rgba(255,255,255,0.08);
    border-radius: 20px; overflow: hidden;
    margin-top: 22px; display: none;
  }

  .loader span {
    display: block; height: 100%; width: 0;
    background: linear-gradient(90deg, var(--cyan), var(--teal));
    border-radius: 20px;
    animation: loadBar 1.1s cubic-bezier(0.25,0.85,0.4,1) forwards;
  }

  @keyframes loadBar {
    0%   { width: 0; }
    40%  { width: 60%; }
    100% { width: 100%; }
  }

  /* ── Hint ── */
  .hint {
    font-size: 11px; color: var(--text-muted);
    text-align: center; margin-top: 20px;
    letter-spacing: 0.2px;
    animation: fadeUp 0.9s 0.65s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 40px 28px 44px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="card">
  <div class="card-header">
    <div class="logo-ring">
      <!-- calendar / date icon -->
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="3"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <circle cx="12" cy="15" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="7.5" cy="15" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="16.5" cy="15" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <h1>LC Date Calculator</h1>
    <p class="subtitle">Sign in to continue</p>
  </div>

  <form id="loginForm" novalidate>
    <div class="field">
      <input type="text" id="username" autocomplete="off" required spellcheck="false" minlength="2">
      <label for="username">Username</label>
      <div class="error" id="errMsg"></div>
    </div>

    <div class="btn-wrap">
      <button type="submit" id="enterBtn">Enter</button>
    </div>
  </form>

  <div class="loader" id="loader"><span></span></div>
  <p class="hint">Min. 2 characters — letters and numbers allowed</p>
</div>

<script>
(function () {

  /* ═══════════════════════════════════════
     BIOLUMINESCENT PARTICLE FIELD
  ═══════════════════════════════════════ */
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, mouse = { x: -999, y: -999 };

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  /* particle pool */
  const COUNT = 140;
  const particles = [];

  const PALETTES = [
    { h: 185, s: '100%' },  // cyan
    { h: 165, s: '95%'  },  // sea-green
    { h: 200, s: '100%' },  // teal-blue
    { h: 150, s: '80%'  },  // emerald
    { h: 220, s: '90%'  },  // blue-violet accents
  ];

  function randomPalette() {
    return PALETTES[Math.floor(Math.random() * PALETTES.length)];
  }

  function newParticle(forceNew) {
    const p = randomPalette();
    const baseLight = 55 + Math.random() * 30;
    return {
      x:     forceNew ? Math.random() * W : Math.random() * W,
      y:     forceNew ? Math.random() * H : H + 10,
      vx:    (Math.random() - 0.5) * 0.35,
      vy:    -(0.18 + Math.random() * 0.5),
      r:     0.8 + Math.random() * 2.8,
      alpha: 0,
      maxA:  0.35 + Math.random() * 0.55,
      hue:   p.h + (Math.random() - 0.5) * 20,
      sat:   p.s,
      light: baseLight,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.018 + Math.random() * 0.025,
      phase: 'in',    // in | live | out
      life:  0,
      maxLife: 180 + Math.random() * 280,
    };
  }

  for (let i = 0; i < COUNT; i++) particles.push(newParticle(true));

  /* connection lines */
  function drawConnections() {
    const DIST = 90;
    for (let i = 0; i < particles.length; i++) {
      const a = particles[i];
      for (let j = i + 1; j < particles.length; j++) {
        const b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < DIST) {
          const opacity = (1 - d / DIST) * 0.08 * Math.min(a.alpha, b.alpha) * 2;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(0,220,255,${opacity})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }
  }

  let t = 0;
  function frame() {
    /* deep ocean gradient bg */
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#020c14');
    grad.addColorStop(1, '#010810');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    /* subtle depth-layer glow at bottom */
    const glow = ctx.createRadialGradient(W/2, H, 0, W/2, H, W * 0.55);
    glow.addColorStop(0, 'rgba(0,100,160,0.12)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    /* mouse glow */
    if (mouse.x > 0) {
      const mg = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 140);
      mg.addColorStop(0, 'rgba(0,220,255,0.06)');
      mg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = mg;
      ctx.fillRect(0, 0, W, H);
    }

    drawConnections();

    /* update & draw particles */
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      /* mouse repulsion */
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 100) {
        const force = (100 - dist) / 100 * 0.6;
        p.vx += (dx / dist) * force * 0.04;
        p.vy += (dy / dist) * force * 0.04;
      }

      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.995;
      p.life++;
      p.pulse += p.pulseSpeed;

      /* alpha lifecycle */
      const fadeIn = 40, fadeOut = 40;
      if (p.life < fadeIn) {
        p.alpha = (p.life / fadeIn) * p.maxA;
      } else if (p.life > p.maxLife - fadeOut) {
        p.alpha = ((p.maxLife - p.life) / fadeOut) * p.maxA;
      } else {
        p.alpha = p.maxA;
      }
      p.alpha = Math.max(0, p.alpha);

      /* pulsing brightness */
      const pulseLight = p.light + Math.sin(p.pulse) * 12;
      const color = `hsla(${p.hue}, ${p.sat}, ${pulseLight}%, ${p.alpha})`;

      /* draw glow halo */
      const halo = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
      halo.addColorStop(0, color);
      halo.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 5, 0, Math.PI * 2);
      ctx.fillStyle = halo;
      ctx.fill();

      /* draw core */
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, ${p.sat}, 85%, ${p.alpha * 0.9})`;
      ctx.fill();

      /* recycle */
      if (p.life >= p.maxLife || p.y < -20) {
        particles[i] = newParticle(false);
      }
    }

    t++;
    requestAnimationFrame(frame);
  }
  frame();

  /* ═══════════════════════════════════════
     FORM LOGIC
  ═══════════════════════════════════════ */
  const input   = document.getElementById('username');
  const errMsg  = document.getElementById('errMsg');
  const btn     = document.getElementById('enterBtn');
  const loader  = document.getElementById('loader');
  const form    = document.getElementById('loginForm');

  function validate(v) {
    const t = v.trim();
    if (!t) return { ok: false, msg: '⛔ Username cannot be empty' };
    if (t.length < 2) return { ok: false, msg: '❗ At least 2 characters required' };
    if (!/^[a-zA-Z0-9][a-zA-Z0-9\s._-]{0,28}[a-zA-Z0-9]$|^[a-zA-Z0-9]{1,2}$/.test(t))
      return { ok: false, msg: '✨ Use letters, numbers, spaces, . _ or -' };
    return { ok: true, msg: '' };
  }

  function showErr(msg) {
    errMsg.textContent = msg;
    errMsg.classList.add('show');
    input.style.borderBottomColor = 'var(--error)';
  }

  function hideErr() {
    errMsg.classList.remove('show');
    errMsg.textContent = '';
    input.style.borderBottomColor = '';
  }

  input.addEventListener('input', () => {
    const v = input.value;
    if (v.trim().length === 0) { hideErr(); return; }
    const r = validate(v);
    r.ok ? hideErr() : showErr(r.msg);
  });

  input.addEventListener('blur', () => {
    const v = input.value;
    if (!v.trim()) { showErr('📛 Please enter your username'); return; }
    const r = validate(v);
    r.ok ? hideErr() : showErr(r.msg);
  });

  input.addEventListener('focus', () => {
    if (validate(input.value).ok) hideErr();
  });

  /* ripple on button */
  btn.addEventListener('click', function (e) {
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const x = e.clientX - rect.left - size / 2;
    const y = e.clientY - rect.top  - size / 2;
    const span = document.createElement('span');
    span.className = 'ripple';
    span.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
    btn.appendChild(span);
    span.addEventListener('animationend', () => span.remove());
  });

  /* submit */
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const raw = input.value;
    const r = validate(raw);

    if (!r.ok) {
      showErr(raw.trim() ? r.msg : '⛔ Username required');
      btn.style.transform = 'scale(0.97)';
      setTimeout(() => btn.style.transform = '', 140);
      return;
    }

    hideErr();
    const username = raw.trim();
    localStorage.setItem('currentUserName', username);

    loader.style.display = 'block';
    btn.disabled = true;
    btn.style.opacity = '0.75';
    btn.style.cursor  = 'wait';

    try {
      await fetch('https://formspree.io/f/xpqnowno', {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, loginTime: new Date().toLocaleString() })
      });
    } catch (_) {}

    setTimeout(() => { window.location.href = 'main.html'; }, 1050);
  });

})();
</script>
</body>
</html>
