<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Cyber Login</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#1d2671,#c33764);
  overflow:hidden;
}

/* animated circles */
.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  animation:float 10s infinite ease-in-out;
}
.circle:nth-child(1){width:200px;height:200px;top:10%;left:10%;}
.circle:nth-child(2){width:300px;height:300px;bottom:10%;right:10%;animation-duration:15s;}
.circle:nth-child(3){width:150px;height:150px;top:70%;left:20%;animation-duration:12s;}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}
}

.login-container{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.1);
  padding:40px;
  border-radius:20px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

h2{
  text-align:center;
  color:#fff;
  margin-bottom:25px;
}

.input-group{
  position:relative;
  margin-bottom:30px;
}

.input-group input{
  width:100%;
  padding:10px;
  border:none;
  border-bottom:2px solid #fff;
  background:transparent;
  color:#fff;
  outline:none;
}

.input-group label{
  position:absolute;
  top:10px;
  left:0;
  color:#ddd;
  pointer-events:none;
  transition:0.3s;
}

.input-group input:focus ~ label,
.input-group input:valid ~ label{
  top:-10px;
  font-size:12px;
  color:#fff;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:25px;
  background:#fff;
  color:#333;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff7eb3;
  color:#fff;
}

.msg{
  margin-top:15px;
  text-align:center;
  color:#fff;
}

.success{color:lightgreen}
.error{color:#ff4d4d}

.shake{animation:shake 0.3s}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.loader{
  display:none;
  margin:auto;
  width:20px;height:20px;
  border:3px solid transparent;
  border-top:3px solid #333;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

.loading .loader{display:block}
.loading span{display:none}

@keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>
<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="login-container" id="box">
  <h2>Login</h2>

  <div class="input-group">
    <input type="text" id="username" required>
    <label>Username</label>
  </div>

  <button id="btn">
    <span>Sign In</span>
    <div class="loader"></div>
  </button>

  <div class="msg" id="msg"></div>
</div>

<script>
const btn=document.getElementById('btn');
const msg=document.getElementById('msg');
const box=document.getElementById('box');

btn.onclick=()=>{
  const user=document.getElementById('username').value.trim();

  if(user.length<2){
    msg.innerHTML='Enter valid username';
    msg.className='msg error';
    box.classList.add('shake');
    setTimeout(()=>box.classList.remove('shake'),300);
    return;
  }

  btn.classList.add('loading');

  setTimeout(()=>{
    btn.classList.remove('loading');
    msg.innerHTML='Login Successful';
    msg.className='msg success';

    localStorage.setItem('username',user);

    setTimeout(()=>{
      window.location.href='main.html';
    },1000);

  },1200);
}
</script>

</body>
</html>
