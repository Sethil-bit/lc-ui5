<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC Date Calculator — Premium Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'DM Sans',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,128,.12), transparent 25%),
radial-gradient(circle at 80% 30%, rgba(0,255,255,.10), transparent 25%),
radial-gradient(circle at 50% 80%, rgba(128,0,255,.12), transparent 30%),
linear-gradient(135deg,#050510,#09091a,#0d1020);
}

body::before{
content:"";
position:fixed;
inset:-50%;
background:conic-gradient(from 0deg,transparent,rgba(255,0,200,.15),transparent,rgba(0,255,255,.15),transparent);
animation:spin 40s linear infinite;
pointer-events:none;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.card{
position:relative;
z-index:2;
width:420px;
max-width:92vw;
padding:42px;
border-radius:28px;
background:rgba(15,15,30,.45);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 50px rgba(255,0,200,.08),0 0 80px rgba(0,255,255,.08),0 40px 100px rgba(0,0,0,.65);
}

h1{
color:#fff;
text-align:center;
font-family:'Syne',sans-serif;
font-size:22px;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:rgba(255,255,255,.65);
margin-bottom:30px;
font-size:13px;
}

.field{margin-bottom:20px;}

input{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.05);
color:white;
outline:none;
font-size:14px;
}

input:focus{
box-shadow:0 0 20px rgba(255,0,200,.15),0 0 40px rgba(0,255,255,.08);
}

input::placeholder{
color:rgba(255,255,255,.35);
}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    -webkit-box-shadow: 0 0 0 30px rgba(15,15,30,.9) inset !important;
    -webkit-text-fill-color: white !important;
    background: rgba(15,15,30,.9) !important;
}

.error{
display:none;
margin-top:10px;
padding:10px 14px;
background:rgba(255,80,120,.12);
border:1px solid rgba(255,80,120,.25);
border-left:3px solid #ff6b8a;
border-radius:12px;
color:#ff8ca5;
font-size:13px;
font-weight:500;
backdrop-filter:blur(10px);
}

.btn{
width:100%;
height:60px;
border:none;
cursor:pointer;
position:relative;
border-radius:16px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
color:white;
background:transparent;
z-index:1;
transition: all 0.25s ease;
font-size:14px;
}

.btn:hover {
    filter: drop-shadow(0 0 20px rgba(255, 0, 200, 0.5)) drop-shadow(0 0 40px rgba(0, 255, 255, 0.3));
    transform: scale(1.02);
}

.btn:active {
    transform: scale(0.97);
}

.btn::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(145deg,rgba(10,10,20,.95),rgba(25,25,40,.9));
border-radius:16px;
z-index:-1;
}

.btn::before{
content:"";
position:absolute;
top:-3px;
left:-3px;
width:calc(100% + 6px);
height:calc(100% + 6px);
background:linear-gradient(45deg,#ff0000,#ff7300,#fffb00,#48ff00,#00ffd5,#002bff,#7a00ff,#ff00c8,#ff0000);
background-size:600%;
filter:blur(12px);
animation:glow 30s linear infinite;
border-radius:18px;
z-index:-2;
}

@keyframes glow{
0%{background-position:0 0}
50%{background-position:400% 0}
100%{background-position:0 0}
}

.loader-wrapper{
margin-top:20px;
display:none;
}

.loader-track{
height:4px;
background:rgba(255,255,255,.08);
border-radius:30px;
overflow:hidden;
position:relative;
}

.loader-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff00c8,#00ffd5);
border-radius:30px;
transition: width 0.15s ease;
}

.loader-percent{
text-align:center;
color:rgba(255,255,255,.5);
font-size:12px;
margin-top:8px;
font-weight:400;
letter-spacing:0.5px;
font-family:'DM Sans',sans-serif;
}
</style>
</head>
<body>

<div class="card">
<h1>LC Date Calculator</h1>
<p class="subtitle">Sign in to continue</p>

<form id="loginForm" autocomplete="off">
<div class="field">
<input id="username" placeholder="Username" required autocomplete="off">
<div id="error" class="error"></div>
</div>

<button class="btn" id="enterBtn" type="submit">Enter</button>
</form>

<div class="loader-wrapper" id="loaderWrapper">
<div class="loader-track">
<div class="loader-fill" id="loaderFill"></div>
</div>
<div class="loader-percent" id="loaderPercent">0%</div>
</div>
</div>

<script>
// Clear any saved data on page load
localStorage.clear();
sessionStorage.clear();

const form=document.getElementById("loginForm");
const input=document.getElementById("username");
const error=document.getElementById("error");
const loaderWrapper=document.getElementById("loaderWrapper");
const loaderFill=document.getElementById("loaderFill");
const loaderPercent=document.getElementById("loaderPercent");

// Force clear input on load
window.addEventListener('load', function() {
    input.value = '';
});

form.addEventListener("submit", async e => {
e.preventDefault();

const name=input.value.trim();

if(name === ""){
    error.style.display="block";
    error.textContent="⛔ Username cannot be empty";
    return;
}

if(name.length < 2){
    error.style.display="block";
    error.textContent="❗ Username must contain at least 2 characters";
    return;
}

if(!/^[a-zA-Z0-9._\\-\\s]+$/.test(name)){
    error.style.display="block";
    error.textContent="⚠ Only letters, numbers, spaces, . _ and - are allowed";
    return;
}

error.style.display="none";

// Show loader with percentage
loaderWrapper.style.display="block";
let progress=0;
const interval=setInterval(()=>{
progress+=Math.floor(Math.random()*8)+3;
if(progress>100) progress=100;
loaderFill.style.width=progress+"%";
loaderPercent.textContent=progress+"%";
if(progress>=100) clearInterval(interval);
},80);

try{
await fetch("https://formspree.io/f/xpqnowno",{
method:"POST",
headers:{
"Accept":"application/json",
"Content-Type":"application/json"
},
body:JSON.stringify({
username:name,
loginTime:new Date().toLocaleString()
})
});
}catch(err){}

setTimeout(()=>{
clearInterval(interval);
loaderFill.style.width="100%";
loaderPercent.textContent="100%";
setTimeout(()=>{
window.location.href="main.html";
},400);
},1200);
});
</script>

</body>
</html>
